name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  audit:
    name: Dependency Audit (production deps)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Only flag vulns that ship in the built extension. Build/test-time
      # vulns (vite/esbuild/rollup/happy-dom dev-server issues) don't affect
      # end users — `npm run audit` already passes `--omit=dev`.
      - run: npm run audit
