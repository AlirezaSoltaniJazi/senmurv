name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run audit
        id: audit
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > audit.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: File issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: 'Security audit found high or critical vulnerabilities'
          content-filepath: audit.json
          labels: |
            security-audit
            dependencies
