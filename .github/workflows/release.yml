name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (use "none" to release the current version, e.g. the first v0.1.0)'
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN works for pushing back; it intentionally does
          # not trigger other workflows, so we won't recurse into this one.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Configure git identity
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test

      - name: Bump version (manual run, unless bump = none)
        id: bump
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'none'
        run: |
          version=$(node scripts/bump-version.mjs ${{ github.event.inputs.bump }})
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Bumped to $version"

      - name: Read current version
        id: read_version
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.bump == 'none'
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ steps.bump.outputs.version }}" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.read_version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run package

      - run: npm run package:local

      - name: Commit (if bumped), tag and push
        if: github.event_name == 'workflow_dispatch'
        run: |
          version="${{ steps.ver.outputs.version }}"
          if [ "${{ github.event.inputs.bump }}" != "none" ]; then
            git add package.json manifest.json package-lock.json
            git commit -m "chore: release v$version"
            git push
          fi
          git tag "v$version"
          git push origin "v$version"

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release/*.zip

      - name: Publish to Chrome Web Store
        if: ${{ env.CWS_EXTENSION_ID != '' }}
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "release/senmurv-${{ steps.ver.outputs.version }}.zip" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
